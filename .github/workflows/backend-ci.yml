name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
  push:
    branches: [develop]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: test_arproperty
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew
      - name: Build with Gradle
        run: |
          cd backend
          ./gradlew build --no-daemon
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_arproperty
          DB_USERNAME: test
          DB_PASSWORD: test
