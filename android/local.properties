# sdk.dir 은 PC마다 달라서 커밋하지 않는다.
# Android Studio가 첫 sync 시 자동으로 채우거나, ANDROID_HOME 환경변수로 fallback 된다.
# 필요 시 수동으로 주석을 풀고 본인 경로를 적는다:
# sdk.dir=/Users/<you>/Library/Android/sdk

# Android 앱이 호출할 백엔드 base URL.
# - 에뮬레이터: http://10.0.2.2:8080/  (기본값, 호스트 PC의 localhost로 매핑)
# - 실기기 + 외부 터널: cloudflared/ngrok로 발급된 https URL로 교체
ARPROPERTY_BASE_URL=http\://10.0.2.2\:8080/

# Google Cloud ARCore Geospatial API 키.
# 패키지명(com.arproperty.android) + 빌드 머신 디버그 keystore의 SHA1 제한이 걸려 있어
# 다른 PC의 keystore에서는 동작하지 않는다. 신규 PC에서 AR 기능을 쓰려면 GCP 콘솔에서
# 해당 SHA1을 화이트리스트에 추가해야 한다. 비어 있어도 앱은 정상 동작 (AR 앵커만 비활성).
GEOSPATIAL_API_KEY=AIzaSyAEdnjDGLYDAu-VWlg3QwloXYvl4q6A33Y

# KAKAO_NATIVE_APP_KEY는 build.gradle.kts:30 의 fallback 값으로 박혀 있으므로 생략 가능.
# 다른 카카오 앱을 가리키고 싶을 때만 여기서 override.
#KAKAO_NATIVE_APP_KEY=
