# ===========================================
# ARProperty 백엔드 환경변수 설정
# ===========================================
# 이 파일을 참고하여 환경변수를 설정하세요.
# 환경변수는 .env 파일 또는 시스템 환경변수로 주입합니다.
# .env 파일은 절대 git에 커밋하지 마세요!
#
# 필요한 환경변수:
#   DB_HOST=localhost
#   DB_PORT=5432
#   DB_NAME=arproperty
#   DB_USERNAME=arproperty
#   DB_PASSWORD=devpassword
#   REDIS_HOST=localhost
#   REDIS_PORT=6379
#
#   # 공공데이터포털 API 키 (https://www.data.go.kr)
#   DATA_GO_KR_API_KEY=your_api_key_here
#
#   # 브이월드 API 키 (https://www.vworld.kr/dev/)
#   VWORLD_API_KEY=your_vworld_key_here
#
#   # Kakao REST API 키 (https://developers.kakao.com)
#   KAKAO_REST_API_KEY=your_kakao_key_here
