# Spring Boot 애플리케이션 설정 - DB(PostgreSQL/PostGIS) · Redis · 외부 API 키
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:arproperty}
    username: ${DB_USERNAME:arproperty}
    password: ${DB_PASSWORD:devpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

# 외부 API 키
app:
  api:
    data-go-kr-key: ${DATA_GO_KR_API_KEY:}
    vworld-key: ${VWORLD_API_KEY:}
    kakao-rest-key: ${KAKAO_REST_API_KEY:}
  gumi:
    sigungu-cd: "47190"
