version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: arproperty-db
    environment:
      POSTGRES_DB: arproperty
      POSTGRES_USER: arproperty
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arproperty"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arproperty-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    container_name: arproperty-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: arproperty
      DB_USERNAME: arproperty
      DB_PASSWORD: ${DB_PASSWORD:-devpassword}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATA_GO_KR_API_KEY: ${DATA_GO_KR_API_KEY:-}
      VWORLD_API_KEY: ${VWORLD_API_KEY:-}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
  redisdata:
